name: Maven Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out the code
      uses: actions/checkout@v2

    - name: Set up JDK 23
      uses: actions/setup-java@v2
      with:
        java-version: '23'
        distribution: 'adoptopenjdk'

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Set up Maven
      run: mvn --version

    - name: Build and Test with Maven
      run: mvn clean install --no-transfer-progress

    # Verifica se os arquivos de resultados de teste existem antes de tentar enviar
    - name: Upload test results if present
      if: always()  # Sempre será executado, mas só se o diretório existir
      uses: actions/upload-artifact@v2
      with:
        name: test-results
        path: target/surefire-reports/*.xml  # Certifique-se de que os arquivos XML de teste existem

    # Verifica se o artefato de build .jar foi gerado antes de tentar enviar
    - name: Upload build artifacts if .jar exists
      if: success()  # Somente se a etapa de build foi bem-sucedida
      uses: actions/upload-artifact@v2
      with:
        name: build-artifacts
        path: target/*.jar  # Verifique se os arquivos .jar realmente existem em 'target/'

  notify:
    if: failure()
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Send notification (optional)
        run: echo "Build failed! Investigate the issues."
