name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout do código fonte
      - name: Checkout repository
        uses: actions/checkout@v3

      # Configurar o Maven
      - name: Setup Maven
        uses: actions/setup-maven@v3
        with:
          maven-version: '3.9.9'  # Configuração para usar Maven 3.9.9

      # Configurar o JDK 23
      - name: Set up JDK 23
        uses: actions/setup-java@v3
        with:
          java-version: '23'
          distribution: 'adoptopenjdk'  # Ou você pode usar outra distribuição, como 'zulu'

      # Instalar dependências e rodar os testes
      - name: Build with Maven
        run: mvn clean install

      # Executar os testes (caso tenha a configuração do Surefire)
      - name: Run tests
        run: mvn test
