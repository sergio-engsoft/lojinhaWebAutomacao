name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Passo 1: Fazer checkout do código do repositório
    - name: Checkout code
      uses: actions/checkout@v2

    # Passo 2: Configurar o JDK (OpenJDK 23 com Adoptium)
    - name: Set up JDK 23 (Adoptium)
      uses: actions/setup-java@v2
      with:
        java-version: '23'
        distribution: 'temurin'  # Usar o Temurin, distribuição oficial do OpenJDK

    # Passo 3: Rodar os testes com Maven (modo verboso para mais detalhes nos logs)
    - name: Run Maven tests (Verbose)
      run: mvn clean test -X  # Rodar Maven no modo verboso para exibir mais detalhes

    # Passo 4: Arquivar os resultados dos testes (opcional, para salvar relatórios)
    - name: Archive test results
      if: always()  # Garantir que os resultados sejam arquivados, mesmo que o teste falhe
      uses: actions/upload-artifact@v3  # Usando a versão mais recente (v3) da ação
      with:
        name: test-results
        path: target/surefire-reports/**  # Corrigido o caminho para incluir todos os arquivos de relatório gerados

    # Passo 5: Publicar cobertura de código (opcional)
    - name: Upload code coverage to Codecov
      uses: codecov/codecov-action@v2
      with:
        token: ${{ secrets.CODECOV_TOKEN }}  # Se você usa Codecov para cobertura de código
