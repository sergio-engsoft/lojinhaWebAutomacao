name: Maven Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Checkout o código do repositório
    - name: Checkout code
      uses: actions/checkout@v2

    # Configurar o JDK 23 (ajuste conforme sua versão do JDK)
    - name: Set up JDK 23
      uses: actions/setup-java@v2
      with:
        java-version: '23'
        distribution: 'adoptopenjdk'

    # Configurar o Maven
    - name: Set up Maven
      uses: actions/setup-maven@v2

    # Cache do repositório Maven (para acelerar o build)
    - name: Cache Maven dependencies
      uses: actions/cache@v2
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/*.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    # Rodar o Maven clean install
    - name: Build with Maven
      run: mvn clean install -DskipTests=true

    # Rodar os testes
    - name: Run tests with Maven
      run: mvn test

    # Publicar relatórios do Allure (se você estiver utilizando Allure)
    - name: Allure Report
      if: success()
      run: |
        allure serve target/allure-results
