name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout do código fonte
      - name: Checkout code
        uses: actions/checkout@v2  # Usando v2 como no outro projeto

      # Configurar o JDK 23 (Adoptium)
      - name: Set up JDK 23 (Adoptium)
        uses: actions/setup-java@v2  # Usando v2 aqui também
        with:
          java-version: '23'
          distribution: 'temurin'

      # Rodar os testes com Maven
      - name: Run Maven tests
        run: mvn clean test
