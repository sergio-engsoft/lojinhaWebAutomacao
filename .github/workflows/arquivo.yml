name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Configuração do Maven
      - name: Set up Maven
        uses: actions/setup-maven@v3
        with:
          maven-version: '3.9.9'

      # 3. Cache para dependências do Maven
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Compilação e execução dos testes
      - name: Build and test with Maven
        run: mvn clean install

      # 5. Verificar se o build foi bem-sucedido
      - name: Check build success
        if: success()
        run: echo "Build and tests passed!"

      # 6. Enviar artefatos para o GitHub (opcional)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: target/*
