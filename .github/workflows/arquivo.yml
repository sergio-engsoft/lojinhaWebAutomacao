name: CI and CD for Selenium Automation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v2

    - name: Configurar JDK 23
      uses: actions/setup-java@v2
      with:
        java-version: '23'
        distribution: 'adoptopenjdk'  # Distribuição do JDK

    - name: Baixar e configurar o Maven
      uses: actions/setup-java@v2
      with:
        java-version: '23'
        maven-version: '3.8.4'
        distribution: 'adoptopenjdk'  # Distribuição do JDK

    - name: Construir e rodar testes com Maven
      run: mvn clean install

  cd:
    runs-on: ubuntu-latest
    needs: ci

    steps:
