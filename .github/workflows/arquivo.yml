name: CI and CD for Selenium Automation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v2

    - name: Configurar JDK 23 com Adoptium (Temurin)
      uses: actions/setup-java@v2
      with:
        java-version: '23'
        distribution: 'temurin'

    - name: Configurar o Maven
      uses: actions/setup-java@v2
      with:
        java-version: '23'
        maven-version: '3.8.4'
        distribution: 'temurin'

    - name: Construir e rodar testes com Maven
      run: mvn clean install -B
