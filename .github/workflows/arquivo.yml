name: CI - Automação Web Java Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin' # Uma distribuição OpenJDK

      - name: Cache de dependências Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build com Maven
        run: mvn clean install -DskipTests # Compila o projeto, pulando os testes inicialmente

      - name: Executar testes com Maven
        run: mvn failsafe:integration-test verify

      - name: Gerar relatório Allure
        if: always() # Executa mesmo se os testes falharem para capturar os resultados
        run: mvn allure:report

      - name: Upload do relatório Allure como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report
