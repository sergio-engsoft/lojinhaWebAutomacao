name: CI/CD - Lojinha Web Automação

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do Código
        uses: actions/checkout@v4

      - name: ☕ Instalar JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '23'

      - name: 🐍 Instalar Maven Manualmente
        run: |
          wget https://downloads.apache.org/maven/maven-3/3.9.9/binaries/apache-maven-3.9.9-bin.tar.gz
          tar -xvzf apache-maven-3.9.9-bin.tar.gz
          sudo mv apache-maven-3.9.9 /usr/local/apache-maven
          echo "/usr/local/apache-maven/bin" >> $GITHUB_PATH

      - name: 🧪 Build e Testes Automatizados
        run: mvn clean install

      - name: 📝 Upload de Relatórios (Surefire)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports

      - name: 🚀 Deploy Exemplo (Simulado)
        if: success()
        run: |
          echo "Simulando deploy da Lojinha..."
          echo "Deploy realizado com sucesso!"
