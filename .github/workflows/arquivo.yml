name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout do código fonte
      - name: Checkout repository
        uses: actions/checkout@v3

      # Configurar o Maven
      - name: Setup Maven
        uses: actions/setup-maven@v3
        with:
          maven-version: '3.8.4'  # Ou qualquer outra versão que você queira usar

      # Configurar o JDK (Java 21 no seu caso)
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'adoptopenjdk'  # Pode usar 'zulu' ou outros se preferir

      # Instalar dependências e rodar os testes
      - name: Build with Maven
        run: mvn clean install

      # Executar os testes (caso tenha a configuração do Surefire)
      - name: Run tests
        run: mvn test
