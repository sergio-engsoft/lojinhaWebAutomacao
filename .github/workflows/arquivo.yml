name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Passo 1: Checkout do código
      - name: Checkout repository
        uses: actions/checkout@v2

      # Passo 2: Configuração do JDK 23
      - name: Set up JDK 23
        uses: actions/setup-java@v2
        with:
          java-version: '23'
          distribution: 'adoptopenjdk'

      # Passo 3: Instalar dependências com Maven
      - name: Install dependencies with Maven
        run: mvn install -DskipTests

      # Passo 4: Instalar o WebDriver do Chrome (usando a ação oficial do Google Chrome)
      - name: Set up ChromeDriver
        uses: googlechrome/setup-chromedriver@v2
        with:
          chromedriver-version: 'latest'

      # Passo 5: Rodar os testes com Maven
      - name: Run tests
        run: mvn test

      # Passo 6: Enviar relatórios (opcional, caso tenha integração com testes de relatórios como Allure ou semelhante)
      - name: Upload test results
        uses: actions/upload-artifact@v2
        with:
          name: test-results
          path: target/test-logs/
